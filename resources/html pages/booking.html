<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay - Paradise Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="font-sans bg-gray-50">
    <!-- Navigation (same as homepage) -->

    <!-- Booking Container -->
    <section class="py-12">
        <div class="max-w-5xl mx-auto px-6">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                <div class="md:flex">
                    <!-- Room Summary -->
                    <div class="md:w-1/3 bg-blue-50 p-8">
                        <h2 class="text-2xl font-bold mb-6">Your Reservation</h2>
                        
                        <div class="mb-6">
                            <h3 class="font-bold mb-2">Deluxe Room</h3>
                            <img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304" alt="Deluxe Room" class="w-full h-40 object-cover rounded-lg mb-3">
                            <div class="flex justify-between text-sm text-gray-600 mb-1">
                                <span><i class="fas fa-user mr-1"></i> 2 Adults</span>
                                <span><i class="fas fa-ruler-combined mr-1"></i> 350 sq ft</span>
                            </div>
                            <div class="text-sm text-gray-600 mb-1">
                                <i class="fas fa-bed mr-1"></i> 1 King Bed
                            </div>
                        </div>
                        
                        <div class="border-t border-gray-200 pt-4">
                            <div class="flex justify-between mb-2">
                                <span>Room Rate</span>
                                <span>$199.00</span>
                            </div>
                            <div class="flex justify-between mb-2">
                                <span>Taxes & Fees</span>
                                <span>$25.87</span>
                            </div>
                            <div class="flex justify-between font-bold text-lg mt-4 pt-4 border-t border-gray-200">
                                <span>Total</span>
                                <span>$224.87</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Booking Form -->
                    <div class="md:w-2/3 p-8">
                        <h2 class="text-2xl font-bold mb-6">Guest Information</h2>
                        
                        <form>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <div>
                                    <label class="block text-gray-700 font-medium mb-2">First Name</label>
                                    <input type="text" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                                </div>
                                <div>
                                    <label class="block text-gray-700 font-medium mb-2">Last Name</label>
                                    <input type="text" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                                </div>
                                <div>
                                    <label class="block text-gray-700 font-medium mb-2">Email</label>
                                    <input type="email" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                                </div>
                                <div>
                                    <label class="block text-gray-700 font-medium mb-2">Phone</label>
                                    <input type="tel" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                                </div>
                            </div>
                            
                            <h3 class="font-bold text-lg mb-4">Payment Information</h3>
                            
                            <div class="mb-6">
                                <label class="block text-gray-700 font-medium mb-2">Card Number</label>
                                <input type="text" placeholder="1234 5678 9012 3456" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                <div>
                                    <label class="block text-gray-700 font-medium mb-2">Expiration Date</label>
                                    <input type="text" placeholder="MM/YY" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                                </div>
                                <div>
                                    <label class="block text-gray-700 font-medium mb-2">Security Code</label>
                                    <input type="text" placeholder="CVC" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                                </div>
                                <div>
                                    <label class="block text-gray-700 font-medium mb-2">Billing Zip Code</label>
                                    <input type="text" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                                </div>
                            </div>
                            
                            <div class="mb-6">
                                <label class="flex items-center">
                                    <input type="checkbox" class="form-checkbox h-5 w-5 text-blue-600">
                                    <span class="ml-2 text-gray-700">I agree to the <a href="#" class="text-blue-600 hover:underline">terms and conditions</a></span>
                                </label>
                            </div>
                            
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition">Complete Booking</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer (same as homepage) -->
</body>
</html>
